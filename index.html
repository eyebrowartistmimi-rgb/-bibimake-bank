<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIBIMAKE | 振込口座一覧</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+JP:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a0a;
  --card-bg: #141414;
  --card-border: #1f1f1f;
  --gold: #c9a96e;
  --gold-light: #e8d5a8;
  --gold-dark: #8a6f3e;
  --text: #e8e8e8;
  --text-muted: #777;
  --accent: #c9a96e;
}

body {
  font-family: 'Noto Sans JP', 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Noise overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 100;
}

.container {
  max-width: 480px;
  margin: 0 auto;
  padding: 0 20px 60px;
}

/* Header */
.header {
  text-align: center;
  padding: 50px 0 40px;
  position: relative;
}

.header::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

.logo-text {
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  letter-spacing: 8px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 8px;
  font-weight: 300;
  opacity: 0;
  animation: fadeDown 0.8s ease forwards;
}

.header h1 {
  font-family: 'Outfit', sans-serif;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--text);
  opacity: 0;
  animation: fadeDown 0.8s ease 0.15s forwards;
}

.header .subtitle {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 12px;
  letter-spacing: 4px;
  text-transform: uppercase;
  opacity: 0;
  animation: fadeDown 0.8s ease 0.3s forwards;
}

/* Cards */
.card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
  opacity: 0;
  transform: translateY(20px);
  animation: cardIn 0.6s ease forwards;
  transition: border-color 0.3s ease, transform 0.3s ease;
}

.card:hover {
  border-color: var(--gold-dark);
  transform: translateY(-2px);
}

.card:nth-child(1) { animation-delay: 0.4s; }
.card:nth-child(2) { animation-delay: 0.5s; }
.card:nth-child(3) { animation-delay: 0.6s; }
.card:nth-child(4) { animation-delay: 0.7s; }
.card:nth-child(5) { animation-delay: 0.8s; }
.card:nth-child(6) { animation-delay: 0.9s; }

.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dark), transparent);
  opacity: 0;
  transition: opacity 0.3s;
}

.card:hover::before {
  opacity: 1;
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
}

.card-name {
  font-family: 'Outfit', sans-serif;
  font-size: 20px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 1px;
}

.card-name-jp {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 2px;
  margin-top: 2px;
}

.card-icon {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.card-details {
  display: grid;
  gap: 10px;
}

.detail-row {
  display: flex;
  align-items: center;
  gap: 12px;
}

.detail-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text-muted);
  min-width: 56px;
  flex-shrink: 0;
}

.detail-value {
  font-size: 14px;
  color: var(--text);
  font-weight: 400;
  letter-spacing: 0.5px;
}

.detail-value.account-number {
  font-family: 'Outfit', monospace;
  font-weight: 600;
  font-size: 16px;
  color: var(--gold-light);
  letter-spacing: 2px;
}

.divider {
  height: 1px;
  background: var(--card-border);
  margin: 14px 0;
}

.copy-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  width: 100%;
  padding: 10px;
  margin-top: 16px;
  background: transparent;
  border: 1px solid var(--card-border);
  border-radius: 10px;
  color: var(--text-muted);
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.3s ease;
  font-family: 'Noto Sans JP', sans-serif;
}

.copy-btn:hover {
  border-color: var(--gold-dark);
  color: var(--gold);
  background: rgba(201, 169, 110, 0.05);
}

.copy-btn.copied {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(201, 169, 110, 0.1);
}

.copy-btn svg {
  width: 14px;
  height: 14px;
}

/* Note section */
.note {
  text-align: center;
  margin-top: 40px;
  padding: 24px;
  border: 1px solid var(--card-border);
  border-radius: 16px;
  opacity: 0;
  animation: cardIn 0.6s ease 1.1s forwards;
}

.note p {
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.8;
  letter-spacing: 0.5px;
}

.note .highlight {
  color: var(--gold);
}

/* Animations */
@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 2px; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo-text">BIBIMAKE</div>
    <h1>BANK ACCOUNTS</h1>
    <div class="subtitle">出張立ち合い 振込口座一覧</div>
  </div>

  <div id="cards"></div>

  <div class="note">
    <p>出張立ち合いの費用は<br><span class="highlight">仮予約後にお振込み</span>ください。<br>お振込を確認後正式な予約となります。</p>
    <div style="margin-top:16px; padding:16px; background:rgba(201,169,110,0.08); border:1px solid var(--gold-dark); border-radius:10px; text-align:left;">
      <p style="font-size:11px; font-weight:700; color:var(--gold); letter-spacing:1px; margin-bottom:8px;">⚠️ キャンセル・日程変更について</p>
      <p style="font-size:11px; color:var(--text-muted); line-height:1.8;">施術予定日から<span class="highlight" style="font-weight:600;">3日以内</span>は立ち合い費お振込み後のキャンセルによる返金はお受けできかねます。3日より前の日程は変更可能です。</p>
    </div>
    <p style="margin-top:16px;">ご不明点はお気軽にご相談ください 🕊️</p>
  </div>
</div>

<script>
const accounts = [
  {
    name: "FUMI",
    nameJp: "弥永扶美",
    emoji: "🏦",
    bank: "みずほ銀行",
    branch: "中野北口支店",
    type: "普通",
    number: "1344524",
    holder: "ふみ",
    note: "出張立ち合いご相談ください"
  },
  {
    name: "MIMI",
    nameJp: "菊地美海",
    emoji: "🦁",
    bank: "GMOあおぞらネット銀行",
    branch: "ハビト支店",
    type: "普通",
    number: "1280907",
    holder: "キクチ ミミ"
  },
  {
    name: "AYAKA",
    nameJp: "菊田采伽",
    emoji: "✨",
    bank: "三井住友銀行",
    branch: "堺支店",
    type: "普通",
    number: "2107723",
    holder: "キクタ アヤカ"
  },
  {
    name: "ERI",
    nameJp: "モロエリ",
    emoji: "✨",
    bank: "栃木銀行",
    branch: "本店営業部（001）",
    type: "普通",
    number: "2188371",
    holder: "モロエリ"
  },
  {
    name: "SAKI",
    nameJp: "内藤紗貴",
    emoji: "💎",
    bank: "りそな銀行",
    branch: "千住支店",
    type: "普通",
    number: "1917995",
    holder: "ナイトウ サキ"
  },
  {
    name: "RYOKO",
    nameJp: "江崎稜子",
    emoji: "🌸",
    bank: "楽天銀行",
    branch: "ビオラ支店",
    type: "普通",
    number: "2381701",
    holder: "エサキ リョウコ"
  }
  ,{
    name: "KEIKO",
    nameJp: "青木恵子",
    emoji: "💫",
    bank: "三菱UFJ銀行",
    branch: "笹塚支店（138）",
    type: "普通",
    number: "1007473",
    holder: "アオキ ケイコ"
  }
  ,{
    name: "MOE",
    nameJp: "シバタモエ",
    emoji: "💫",
    bank: "楽天銀行",
    branch: "ロンド支店（232）",
    type: "普通",
    number: "4167466",
    holder: "シバタ モエ"
  }
];

const cardsContainer = document.getElementById('cards');

accounts.forEach((acc, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  
  const copyText = `${acc.bank}\n${acc.branch}\n${acc.type} ${acc.number}\n${acc.holder}`;
  
  card.innerHTML = `
    <div class="card-header">
      <div>
        <div class="card-name">${acc.name}</div>
        <div class="card-name-jp">${acc.nameJp}</div>
      </div>
    </div>
    <div class="card-details">
      <div class="detail-row">
        <span class="detail-label">銀行</span>
        <span class="detail-value">${acc.bank}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">支店</span>
        <span class="detail-value">${acc.branch}</span>
      </div>
      <div class="divider"></div>
      <div class="detail-row">
        <span class="detail-label">口座</span>
        <span class="detail-value">${acc.type}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">番号</span>
        <span class="detail-value account-number">${acc.number}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">名義</span>
        <span class="detail-value">${acc.holder}</span>
      </div>
    </div>
    <button class="copy-btn" onclick="copyInfo(this, \`${copyText.replace(/`/g, '\\`')}\`)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      コピー
    </button>
  `;
  
  cardsContainer.appendChild(card);
});

function copyInfo(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add('copied');
    btn.innerHTML = `
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>
      コピーしました
    `;
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        コピー
      `;
    }, 2000);
  });
}
</script>

</body>
</html>
